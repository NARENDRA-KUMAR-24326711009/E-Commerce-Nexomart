{% extends 'base.html' %}
{% block title %}Register - NEXOMART{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-left">
            <h2>Create Account</h2>
            <p>Signup for exclusive NEXOMART deals and offers</p>
        </div>
        <div class="auth-right">
            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Your email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="10-digit mobile number">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
            <p class="auth-switch">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
